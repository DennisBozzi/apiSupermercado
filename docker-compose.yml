services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: apisupermercado-api:dev
    container_name: apisupermercado-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    profiles: ["tools"]
    working_dir: /src
    volumes:
      - .:/src
      - dotnet-home:/root/.dotnet
      - nuget-cache:/root/.nuget
    env_file:
      - .env
    entrypoint:
      - bash
      - -c
      - |
        set -e
        dotnet tool restore >/dev/null
        dotnet ef "$$@" -p src/Infrastructure -s src/Api
      - bash

volumes:
  dotnet-home:
  nuget-cache:
